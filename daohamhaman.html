<script>
    // ----------------------------- DANH SÁCH CÂU HỎI -------------------------

    const questions = [
        // ----- LÝ THUYẾT (câu 1-5) -----

        // ----- BÀI TẬP DỄ (5 câu) -----
        { id: 5, type: "baitap", level: "Dễ", levelCode: "de",
          text: "Cho phương trình hàm ẩn \(x^2 + y^2 = 25\). Tính \(y' = \\frac{dy}{dx}\).",
          options: ["\(-\\frac{x}{y}\)", "\(\\frac{x}{y}\)", "\(-\\frac{y}{x}\)", "\(\\frac{y}{x}\)"],

          explanation: "Đạo hàm 2 vế: \(2x + 2y y' = 0 \\Rightarrow y' = -\\frac{x}{y}\).",

          text: "Với \(x^3 + y^3 = 1\), đạo hàm \(y'\) là:",

          explanation: "Đạo hàm: \(3x^2 + 3y^2 y' = 0 \\Rightarrow y' = -\\frac{x^2}{y^2}\).",

        },
        { id: 7, type: "baitap", level: "Dễ", levelCode: "de",
          text: "Tìm \(y'\) của hàm ẩn \(xy = 1\).",

          explanation: "Đạo hàm: \(y + x y' = 0 \\Rightarrow y' = -\\frac{y}{x}\).",

        { id: 8, type: "baitap", level: "Dễ", levelCode: "de",
          text: "Cho \(x^2 - y^2 = 4\). Khi đó \(y'\) bằng:",
          options: ["\(\\frac{x}{y}\)", "\(-\\frac{x}{y}\)", "\(\\frac{y}{x}\)", "\(\\frac{2x}{2y}\)"],
          correct: 0,
          explanation: "\(2x - 2y y' = 0 \\Rightarrow -2y y' = -2x \\Rightarrow y' = x/y\).",
          tip: "Lưu ý dấu: chuyển vế cẩn thận, kết quả \(y' = x/y\)."
        },
        { id: 9, type: "baitap", level: "Dễ", levelCode: "de",
          text: "Cho hàm ẩn \(y^2 = 4x\). Tính \(y'\).",

          explanation: "Đạo hàm: \(2y y' = 4 \\Rightarrow y' = \\frac{4}{2y} = \\frac{2}{y}\).",
          tip: "Đạo hàm y² → 2y y', đơn giản hệ số."
        },

        // ----- BÀI TẬP TRUNG BÌNH (5 câu) -----
        { id: 10, type: "baitap", level: "Trung bình", levelCode: "tb",
          text: "Cho \(x^2 y + y^2 x = 2\). Tìm biểu thức \(y'\).",
          options: [
            "\(-\\frac{2xy + y^2}{x^2 + 2xy}\)",
            "\(-\\frac{2xy + y^2}{x^2 + 2xy}\)",
            "\(-\\frac{x^2 + y^2}{2xy}\)",
            "\(-\\frac{2x + y}{x + 2y}\)"
          ],
          correct: 0,
          explanation: "Đạo hàm: \((2xy + x^2 y') + (y^2 + 2xy y') = 0 \\Rightarrow y'(x^2 + 2xy) = -2xy - y^2 \\Rightarrow y' = -\\frac{2xy + y^2}{x^2 + 2xy}\).",

        { id: 11, type: "baitap", level: "Trung bình", levelCode: "tb",
          text: "Tìm \(y'\) biết \(x^2 + 2xy + y^2 = 1\). (gợi ý \((x+y)^2=1\))",
          options: ["\(-1\)", "\(1\)", "\(-\\frac{x}{y}\)", "\(\\frac{y}{x}\)"],
          correct: 0,
          explanation: "Đạo hàm: \(2x + 2y + 2xy' + 2yy' = 0 \\Rightarrow 2(x+y) + 2y'(x+y)=0 \\Rightarrow (x+y)(1+y')=0\). Với \(x+y \\neq 0\) thì \(y' = -1\).",
          tip: "Nếu x+y khác 0 → y' = -1. Dạng này đẹp, nhớ chia (x+y)."
        },
        { id: 12, type: "baitap", level: "Trung bình", levelCode: "tb",
          text: "Cho \(x^3 + 3x^2 y + y^3 = 0\). Tính \(y'\).",
          options: [
            "\(-\\frac{x^2 + 2xy}{x^2 + y^2}\)",
            "\(-\\frac{x^2 + 2xy}{x^2 + y^2}\)",

          tip: "Chia cả tử mẫu cho 3 rút gọn."
        },
        { id: 13, type: "baitap", level: "Trung bình", levelCode: "tb",
          text: "Với \(\\sin(xy) = x\), hãy tìm \(y'\).",

            "\(\\frac{1 - xy}{\\cos(xy)}\)"

          correct: 0,
          explanation: "Đạo hàm: \(\\cos(xy)\\cdot (y + xy') = 1 \\Rightarrow y\\cos(xy) + x\\cos(xy) y' = 1 \\Rightarrow y' = \\frac{1 - y\\cos(xy)}{x\\cos(xy)}\).",

        },
        { id: 14, type: "baitap", level: "Trung bình", levelCode: "tb",
          text: "Cho \(e^{x+y} = x^2\). Tìm \(y'\).",
          options: [

            "\(\\frac{2x}{e^{x+y}} - 1\)",
            "Cả A và B đều đúng",
            "\(\\frac{2x - e^{x+y}}{e^{x+y}}\)"

          correct: 0,

          tip: "Có thể thay \(e^{x+y}=x^2\) để kiểm tra."
        },

        // ----- BÀI TẬP KHÓ (5 câu) -----
        { id: 15, type: "baitap", level: "Khó", levelCode: "kho",
          text: "Cho phương trình hàm ẩn: \(x^3 + 3x^2y + y^2 x + y^3 = 1\). Tìm \(y'\).",
          options: [
            "\(-\\frac{3x^2 + 6xy + y^2}{3x^2 + 2xy + 3y^2}\)",
            "\(-\\frac{3x^2 + 6xy + y^2}{x^2 + 2xy + 3y^2}\)",
            "\(\\frac{3x^2 + 6xy + y^2}{3x^2 + 2xy + 3y^2}\)",

          correct: 0,

          tip: "Đặt thừa số chung: có thể rút gọn \(xy^2\) nhưng giữ nguyên dạng."

        { id: 17, type: "baitap", level: "Khó", levelCode: "kho",
          text: "Tìm \(y'\) của hàm ẩn: \(\\ln(xy) = x + y\).",

          correct: 0,
          explanation: "\(\\ln x + \\ln y = x+y\) ⇒ đạo hàm: \(\\frac{1}{x} + \\frac{y'}{y} = 1 + y'\) ⇒ \(\\frac{y'}{y} - y' = 1 - \\frac{1}{x}\) ⇒ \(y'(\\frac{1}{y} - 1) = \\frac{x-1}{x}\) ⇒ quy đồng: \(y' = \\frac{(x-1)/x}{(1-y)/y} = \\frac{y(x-1)}{x(1-y)} = \\frac{y(1-xy)}{x(xy-1)}\) (biến đổi tương đương).",

          correct: 0,
          explanation: "Lấy ln: \(y\\ln x = x\\ln y\) ⇒ đạo hàm: \(y'\\ln x + \\frac{y}{x} = \\ln y + x\\frac{y'}{y}\) ⇒ \(y'(\\ln x - \\frac{x}{y}) = \\ln y - \\frac{y}{x}\) ⇒ quy đồng: \(y' = \\frac{\\ln y - y/x}{\\ln x - x/y} = \\frac{y(x\\ln y - y)}{x(y\\ln x - x)}\).",
          tip: "Dùng logarit hóa rồi đạo hàm ẩn là cách hiệu quả nhất cho dạng mũ."
        },
        { id: 19, type: "baitap", level: "Khó", levelCode: "kho",
          text: "Phương trình \(x^2 + xy + y^2 = 7\). Tìm \(y'\) dưới dạng tổng quát.",
          options: [
            "\(-\\frac{2x + y}{x + 2y}\)",
            "\(-\\frac{2x + y}{x + 2y}\)",
            "\(\\frac{2x + y}{x + 2y}\)",
            "\(-\\frac{x + 2y}{2x + y}\)"
          ],
          correct: 0,
          explanation: "Đạo hàm: \(2x + (y + xy') + 2y y' = 0\) ⇒ \(2x + y + y'(x+2y)=0\) ⇒ \(y' = -\\frac{2x+y}{x+2y}\).",
          tip: "Công thức nhanh cho dạng bậc 2: \(Ax^2+Bxy+Cy^2 = D\) ⇒ \(y' = -\\frac{2Ax+By}{Bx+2Cy}\)."
        }
    ];

    // Đảm bảo index đúng: có 20 câu (0..19)
    console.assert(questions.length === 20, "Số lượng câu hỏi phải là 20");

    // State lưu câu trả lời đã chọn (lưu index lựa chọn, -1 nếu chưa chọn)
    let selectedAnswers = new Array(20).fill(-1);
    let answerStatus = new Array(20).fill(false); // true nếu đã chọn (đúng hay sai chỉ để hiển thị)

    // Render toàn bộ câu hỏi
    function renderQuestions() {
        const container = document.getElementById('questionsList');
        container.innerHTML = '';
        questions.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.setAttribute('data-qid', idx);
            // header
            const levelClass = q.levelCode === 'de' ? 'level-de' : (q.levelCode === 'tb' ? 'level-tb' : (q.levelCode === 'kho' ? 'level-kho' : 'level-ly'));
            const levelText = q.type === 'lythuyet' ? `📖 ${q.level}` : `✏️ ${q.level}`;
            card.innerHTML = `
                <div class="question-header">
                    <span class="q-num">Câu ${idx+1}</span>
                    <span class="q-level ${levelClass}">${levelText}</span>
                </div>
                <div class="question-text">${q.text}</div>
                <div class="options" id="options-${idx}">
                    ${q.options.map((opt, optIdx) => `
                        <div class="opt" data-optidx="${optIdx}" data-qidx="${idx}">
                            <input type="radio" name="q${idx}" id="q${idx}_opt${optIdx}" value="${optIdx}" ${selectedAnswers[idx] === optIdx ? 'checked' : ''}>
                            <label for="q${idx}_opt${optIdx}">${String.fromCharCode(65+optIdx)}. ${opt}</label>
                        </div>
                    `).join('')}
                </div>
                <div class="feedback" id="fb-${idx}">
                    <strong>📌 Đáp án đúng: ${String.fromCharCode(65+q.correct)}</strong><br>
                    <strong>✍️ Giải thích:</strong> ${q.explanation}<br>
                    <div class="tip">💡 <strong>Mẹo nhanh:</strong> ${q.tip}</div>
                </div>
            `;
            container.appendChild(card);
            // Gán sự kiện cho các radio trong card này
            const radios = card.querySelectorAll(`input[type="radio"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const qid = parseInt(radio.name.slice(1));
                    const selectedVal = parseInt(radio.value);
                    handleAnswer(qid, selectedVal);
                });
            });
            // Nếu đã có lựa chọn trước đó, hiển thị lại trạng thái màu và feedback
            if (selectedAnswers[idx] !== -1) {
                applyStyleAndFeedback(idx, selectedAnswers[idx]);
            }
        });
        updateProgress();
        // Kích hoạt MathJax cho công thức mới
        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    function handleAnswer(qid, selectedIdx) {
        const q = questions[qid];
        const isCorrect = (selectedIdx === q.correct);
        // Lưu lại lựa chọn
        selectedAnswers[qid] = selectedIdx;
        // Cập nhật giao diện màu sắc và feedback
        applyStyleAndFeedback(qid, selectedIdx);
        updateProgress();
    }

    function applyStyleAndFeedback(qid, selectedIdx) {
        const q = questions[qid];
        const card = document.querySelector(`.question-card[data-qid='${qid}']`);
        if (!card) return;
        const allOptDivs = card.querySelectorAll('.opt');
        // reset tất cả các class của opt
        allOptDivs.forEach(div => {
            div.classList.remove('opt-correct', 'opt-wrong');
        });
        // đánh dấu option đã chọn đúng hay sai
        const chosenDiv = card.querySelector(`.opt[data-optidx='${selectedIdx}']`);
        if (chosenDiv) {
            if (selectedIdx === q.correct) {
                chosenDiv.classList.add('opt-correct');
            } else {
                chosenDiv.classList.add('opt-wrong');
                // đồng thời highlight luôn đáp án đúng (tùy chọn hiển thị thêm xanh cho đáp án đúng? Nên tô thêm đáp án đúng)
                const correctDiv = card.querySelector(`.opt[data-optidx='${q.correct}']`);
                if (correctDiv) correctDiv.classList.add('opt-correct');
            }
        } else {
            // fallback: nếu không tìm thấy, hiển thị đúng nhưng không có highlight
            const correctDiv = card.querySelector(`.opt[data-optidx='${q.correct}']`);
            if (correctDiv) correctDiv.classList.add('opt-correct');
        }
        // Hiển thị feedback
        const feedbackDiv = card.querySelector(`.feedback`);
        if (feedbackDiv) {
            feedbackDiv.classList.add('show');
            // Cập nhật nội dung (có thể thay đổi đáp án động nếu muốn, nhưng đã tĩnh)
        }
    }

    function updateProgress() {
        let answeredCount = selectedAnswers.filter(idx => idx !== -1).length;
        document.getElementById('progressStats').innerHTML = `📊 ${answeredCount}/20 đã trả lời`;
    }

    // Tải file html về máy (download bản thân trang hiện tại)
    function downloadPage() {
        // Lấy toàn bộ nội dung HTML hiện tại (bao gồm cả script và style)
        let htmlContent = document.documentElement.outerHTML;
        // Thêm metadata để đảm bảo MathJax hoạt động
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'trac_nghiem_dao_ham_ham_an.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // Gán sự kiện cho nút tải
    document.getElementById('downloadBtn').addEventListener('click', downloadPage);

    // Khởi tạo render
    renderQuestions();
</script>
</body>
</html>
