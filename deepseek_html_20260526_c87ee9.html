        },
        { id: 18, type: "baitap", level: "Khó", levelCode: "kho",
          text: "Hàm số \(f(x) = \\frac{|x-2|}{x-2}\) có tập xác định và giá trị như thế nào?",
          options: [
            "\(\\mathbb{R}\), \(f(x)=1\) với mọi x",
            "\(\mathbb{R} \\setminus \\{2\\}\), \(f(x)=1\) nếu x>2 và \(f(x)=-1\) nếu x<2",
            "\(\mathbb{R} \\setminus \\{2\\}\), \(f(x)=1\) với mọi x",
            "\(\mathbb{R}\), \(f(x)=\\pm 1\)"
          ],
          correct: 1,
          explanation: "Mẫu số x-2 ≠0 nên x≠2. Với x>2: |x-2|=x-2 => f=1. Với x<2: |x-2| = -(x-2) => f=-1.",
          tip: "Hàm dấu: \(\\frac{|a|}{a} = \\text{sgn}(a)\) với a≠0."
        },
        { id: 19, type: "baitap", level: "Khó", levelCode: "kho",
          text: "Cho hàm số \(f(x) = \\frac{2x}{x^2-4}\). Mệnh đề nào sau đây đúng?",
          options: [
            "TXĐ: \(x \\neq 2\)",
            "TXĐ: \(x \\neq -2\)",
            "TXĐ: \(x \\neq \\pm 2\)",
            "TXĐ: \(\\mathbb{R}\)"
          ],
          correct: 2,
          explanation: "Mẫu số \(x^2-4=0 \\Leftrightarrow x = \\pm 2\). Vậy TXĐ là \(\\mathbb{R}\\setminus\\{-2,2\\}\).",
          tip: "Phân thức: mẫu khác không, nhớ cả hai nghiệm."
        }
    ];

    // Sửa câu 17 lại cho chính xác (không xác định)
    // Đã sửa correct: 3 và explanation phù hợp.
    // Đảm bảo đủ 20 câu
    console.assert(questions.length === 20, "Phải có 20 câu hỏi");

    // State lưu lựa chọn
    let selectedAnswers = new Array(20).fill(-1);

    // Render toàn bộ câu hỏi
    async function renderQuestions() {
        const container = document.getElementById('questionsList');
        container.innerHTML = '';
        for (let idx = 0; idx < questions.length; idx++) {
            const q = questions[idx];
            const card = document.createElement('div');
            card.className = 'question-card';
            card.setAttribute('data-qid', idx);

            const levelClass = `level-${q.levelCode}`;
            const levelLabel = q.type === 'lythuyet' ? `📘 ${q.level}` : `📝 ${q.level}`;
            // Tạo các option
            let optionsHtml = '';
            q.options.forEach((opt, optIdx) => {
                const letter = String.fromCharCode(65 + optIdx);
                optionsHtml += `
                    <div class="opt" data-optidx="${optIdx}" data-qidx="${idx}">
                        <input type="radio" name="q${idx}" id="q${idx}_opt${optIdx}" value="${optIdx}" ${selectedAnswers[idx] === optIdx ? 'checked' : ''}>
                        <label for="q${idx}_opt${optIdx}" class="math">${letter}. ${opt}</label>
                    </div>
                `;
            });

            card.innerHTML = `
                <div class="question-header">
                    <span class="q-num">Câu ${idx+1}</span>
                    <span class="q-level ${levelClass}">${levelLabel}</span>
                </div>
                <div class="question-text math">${q.text}</div>
                <div class="options" id="options-${idx}">
                    ${optionsHtml}
                </div>
                <div class="feedback" id="fb-${idx}">
                    <strong>✅ Đáp án đúng: ${String.fromCharCode(65+q.correct)}</strong><br>
                    <strong>📖 Giải thích:</strong> <span class="math">${q.explanation}</span><br>
                    <div class="tip">💡 <strong>Mẹo nhanh:</strong> ${q.tip}</div>
                </div>
            `;
            container.appendChild(card);
            // Gắn sự kiện change cho radio
            const radios = card.querySelectorAll(`input[type="radio"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const qid = parseInt(radio.name.slice(1));
                    const selectedVal = parseInt(radio.value);
                    handleAnswer(qid, selectedVal);
                });
            });
            // Nếu đã chọn trước đó, hiển thị màu & feedback
            if (selectedAnswers[idx] !== -1) {
                applyStyleAndFeedback(idx, selectedAnswers[idx]);
            }
        }
        // Gọi MathJax để render công thức mới
        if (window.MathJax) {
            await MathJax.typesetPromise();
        }
        updateProgress();
    }

    function handleAnswer(qid, selectedIdx) {
        const q = questions[qid];
        selectedAnswers[qid] = selectedIdx;
        applyStyleAndFeedback(qid, selectedIdx);
        updateProgress();
    }

    function applyStyleAndFeedback(qid, selectedIdx) {
        const q = questions[qid];
        const card = document.querySelector(`.question-card[data-qid='${qid}']`);
        if (!card) return;
        // reset styles
        const allOpts = card.querySelectorAll('.opt');
        allOpts.forEach(opt => opt.classList.remove('opt-correct', 'opt-wrong'));

        const chosenDiv = card.querySelector(`.opt[data-optidx='${selectedIdx}']`);
        if (chosenDiv) {
            if (selectedIdx === q.correct) {
                chosenDiv.classList.add('opt-correct');
            } else {
                chosenDiv.classList.add('opt-wrong');
                // highlight đáp án đúng
                const correctDiv = card.querySelector(`.opt[data-optidx='${q.correct}']`);
                if (correctDiv) correctDiv.classList.add('opt-correct');
            }
        } else {
            // fallback: tô đáp án đúng
            const correctDiv = card.querySelector(`.opt[data-optidx='${q.correct}']`);
            if (correctDiv) correctDiv.classList.add('opt-correct');
        }
        // hiển thị feedback
        const fbDiv = card.querySelector('.feedback');
        if (fbDiv) fbDiv.classList.add('show');
    }

    function updateProgress() {
        const answered = selectedAnswers.filter(idx => idx !== -1).length;
        document.getElementById('progressStats').innerHTML = `📊 ${answered}/20 đã trả lời`;
    }

    // Tải file HTML (download)
    function downloadPage() {
        let htmlContent = document.documentElement.outerHTML;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'trac_nghiem_ham_so_duymt.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    document.getElementById('downloadBtn').addEventListener('click', downloadPage);
    renderQuestions();
</script>
</body>
</html>
